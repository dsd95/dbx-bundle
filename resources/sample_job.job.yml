# A sample job for dbx_app.

resources:
  jobs:
    sample_job:
      name: sample_job

      git_source:
        git_url: https://github.com/dsd95/dbx-app.git
        git_provider: gitHub
        git_branch: main

      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${var.schema}

      tasks:
        - task_key: run_python
          spark_python_task:
            python_file: src/dbx_app/main.py
            parameters:
              - "--catalog"
              - "${var.catalog}"
              - "--schema"
              - "${var.schema}"
          existing_cluster_id: ${var.cluster_id}
