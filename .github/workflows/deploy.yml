name: Deploy Databricks Bundle

on:
  push:
    branches:
      - main

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    env:
      DATABRICKS_AUTH_TYPE: pat
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_DEV }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_DEV }}
    steps:
      - name: Checkout bundle
        uses: actions/checkout@v4

      - name: Checkout app
        uses: actions/checkout@v4
        with:
          repository: dsd95/dbx-app
          path: dbx-app

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          cd dbx-app
          python -m build

      - name: Copy wheel to bundle dist
        run: |
          mkdir -p dist
          cp dbx-app/dist/*.whl dist/

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate dev
        run: databricks bundle validate -t dev

      - name: Deploy dev
        run: databricks bundle deploy -t dev

      - name: Run dev
        run: databricks bundle run -t dev sample_job

  deploy-prod:
    needs: deploy-dev
    runs-on: ubuntu-latest
    env:
      DATABRICKS_AUTH_TYPE: pat
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PROD }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PROD }}
    steps:
      - name: Checkout bundle
        uses: actions/checkout@v4

      - name: Checkout app
        uses: actions/checkout@v4
        with:
          repository: dsd95/dbx-app
          path: dbx-app

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          cd dbx-app
          python -m build

      - name: Copy wheel to bundle dist
        run: |
          mkdir -p dist
          cp dbx-app/dist/*.whl dist/

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate prod
        run: databricks bundle validate -t prod

      - name: Deploy prod
        run: databricks bundle deploy -t prod

      - name: Run prod
        run: databricks bundle run -t prod sample_job